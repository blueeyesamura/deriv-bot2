<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deriv Pro Trading Bot</title>
    <style>
        body { background: #0d1117; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .card { background: #161b27; padding: 20px; border-radius: 12px; border: 1px solid #2d3748; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; border: 1px solid #2d3748; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e53e3e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .log { height: 250px; overflow-y: auto; background: #0a0d14; padding: 10px; font-family: 'Courier New', monospace; font-size: 12px; border: 1px solid #2d3748; border-radius: 8px; margin-top: 15px; }
        .win { color: #68d391; } .loss { color: #fc8181; } .info { color: #63b3ed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Deriv Pro Bot</h2>
    <input type="text" id="acctIdInput" placeholder="Account ID (e.g. CR00133272)">
    <input type="password" id="patInput" placeholder="PAT Token">
    <button id="connectBtn" onclick="doConnect()">Connect Securely</button>
    <div id="log" class="log"></div>
</div>

<script>
    let ws = null;
    const APP_ID = "36544";

    function log(msg, type = 'info') {
        const el = document.getElementById('log');
        el.innerHTML += `<div class="${type}">${new Date().toLocaleTimeString()} ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    async function doConnect() {
        const pat = document.getElementById('patInput').value.trim();
        const acctId = document.getElementById('acctIdInput').value.trim();
        
        if(!pat || !acctId) { alert('Enter Token and Account ID'); return; }
        
        const btn = document.getElementById('connectBtn');
        btn.disabled = true;
        log('Initializing Pro Session...', 'info');

        try {
            // 1. Session Tunnel Request (The standard Deriv Pro way)
            const res = await fetch(`https://api.derivws.com/trading/v1/options/accounts/otp?account_id=${acctId}`, {
                method: 'POST',
                headers: { 
                    'Deriv-App-ID': APP_ID, 
                    'Authorization': 'Bearer ' + pat, 
                    'Content-Type': 'application/json' 
                }
            });

            const data = await res.json();
            if (!data.url) throw new Error("Server rejected: Check Token/Account ID match.");

            // 2. Open Tunnel
            ws = new WebSocket(data.url);

            ws.onopen = () => {
                log('✓ Tunnel Established.', 'win');
                btn.textContent = 'Connected';
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.error) log('❌ ' + msg.error.message, 'loss');
                else handleMsg(msg, 'new');
            };

        } catch (e) {
            log('❌ ' + e.message, 'loss');
            btn.disabled = false;
        }
    }

    // --- YOUR ORIGINAL FUNCTIONS START HERE ---
    function handleMsg(msg, type) {
        // Your original logic goes here
        console.log(msg);
    }
</script>
</body>
</html>
