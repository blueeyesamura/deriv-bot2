<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deriv Smart Bot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.app{max-width:1100px;margin:0 auto;padding:20px;}
.header{display:flex;align-items:center;gap:14px;margin-bottom:1.2rem;}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#e53e3e,#c53030);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:15px;}
.header h1{font-size:21px;font-weight:700;color:#f7fafc;}
.header p{font-size:11px;color:#718096;margin-top:2px;}
.logout-btn{margin-left:auto;padding:7px 16px;background:transparent;color:#718096;border:1px solid #2d3748;border-radius:8px;font-size:12px;cursor:pointer;}
.logout-btn:hover{color:#fc8181;border-color:#fc8181;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-card{background:#161b27;border:1px solid #2d3748;border-radius:18px;padding:40px;max-width:500px;width:100%;}
.login-card h2{font-size:22px;font-weight:700;color:#f7fafc;margin-bottom:8px;}
.sub{font-size:13px;color:#718096;margin-bottom:20px;line-height:1.7;}
.step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:#a0aec0;line-height:1.6;}
.step-num{min-width:22px;height:22px;border-radius:50%;background:#2b6cb0;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.step a{color:#63b3ed;} .step strong{color:#e2e8f0;}
label{font-size:12px;color:#a0aec0;display:block;margin-bottom:4px;}
input,select{width:100%;padding:10px 13px;background:#0d1117;border:1px solid #2d3748;color:#e2e8f0;border-radius:9px;font-size:13px;outline:none;transition:border 0.2s;margin-bottom:12px;}
input:focus,select:focus{border-color:#4299e1;}
.acct-row{display:flex;gap:8px;margin-bottom:14px;}
.acct-btn{flex:1;padding:10px;border:1px solid #2d3748;border-radius:9px;background:#0d1117;color:#718096;font-size:13px;cursor:pointer;font-weight:600;}
.acct-btn.active{background:#1a2744;color:#90cdf4;border-color:#4299e1;}
.btn-connect{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#e53e3e,#c53030);color:white;margin-top:4px;}
.btn-connect:disabled{opacity:0.45;cursor:not-allowed;}
.note-box{font-size:12px;color:#90cdf4;background:#1a2744;padding:12px;border-radius:8px;border-left:3px solid #4299e1;margin-top:14px;line-height:1.8;}
.sbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#161b27;border-radius:10px;margin-bottom:1rem;border:1px solid #2d3748;}
.dot{width:9px;height:9px;border-radius:50%;background:#4a5568;flex-shrink:0;}
.dot.on{background:#38a169;} .dot.run{background:#e53e3e;animation:blink 1s infinite;} .dot.wait{background:#d69e2e;animation:blink 0.7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:1rem;}
.met{background:#161b27;border:1px solid #2d3748;border-radius:11px;padding:13px;text-align:center;}
.met .v{font-size:21px;font-weight:700;color:#f7fafc;}
.met .l{font-size:10px;color:#718096;margin-top:3px;text-transform:uppercase;letter-spacing:0.05em;}
.price-panel{background:#161b27;border:1px solid #2d3748;border-radius:13px;padding:15px 18px;margin-bottom:13px;}
.price-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.price-full{font-size:30px;font-weight:700;font-family:'Courier New',monospace;color:#f7fafc;}
.ld{padding:3px 8px;border-radius:7px;transition:all 0.15s;display:inline-block;font-size:32px;}
.ld.ok{background:#22543d;color:#9ae6b4;box-shadow:0 0 12px rgba(56,161,105,0.3);}
.ld.bad{background:#742a2a;color:#feb2b2;} .ld.neu{color:#4a5568;}
.strip{display:flex;gap:5px;flex-wrap:wrap;}
.dchip{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:monospace;border:1px solid #2d3748;color:#a0aec0;}
.dchip.ok{background:#22543d;color:#9ae6b4;border-color:#276749;}
.dchip.bad{background:#742a2a;color:#feb2b2;border-color:#9b2c2c;}
.dchip.new{outline:2px solid #4299e1;outline-offset:1px;}
.main-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:13px;}
.card{background:#161b27;border:1px solid #2d3748;border-radius:13px;padding:1.1rem 1.3rem;margin-bottom:13px;}
.card h3{font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:11px;}
.row{display:flex;gap:9px;} .row>div{flex:1;}
.mkt-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px;}
.mkt-tab{padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;background:#0d1117;color:#718096;border:1px solid #2d3748;border-radius:6px;}
.mkt-tab.active{background:#1a2744;color:#90cdf4;border-color:#4299e1;}
.ctabs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px;}
.ctab{padding:9px 4px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;background:#0d1117;color:#718096;border:1px solid #2d3748;border-radius:8px;}
.ctab.active{background:#1a2744;color:#90cdf4;border-color:#4299e1;}
.cond-box{background:#0d1117;border:1px solid #2d3748;border-radius:9px;padding:11px 14px;margin-top:10px;font-size:12px;line-height:2;}
.rule{color:#90cdf4;font-weight:700;} .valid{color:#9ae6b4;} .skiptxt{color:#fc8181;}
.log{background:#0a0d14;border:1px solid #2d3748;border-radius:9px;padding:11px;height:165px;overflow-y:auto;font-size:11.5px;font-family:'Courier New',monospace;}
.ll{padding:2px 0;border-bottom:1px solid #161b27;}
.ll.win{color:#68d391;} .ll.loss{color:#fc8181;} .ll.info{color:#63b3ed;} .ll.skip{color:#f6ad55;} .ll.def{color:#718096;}
.streak{display:flex;gap:5px;flex-wrap:wrap;min-height:15px;}
.sdot{width:15px;height:15px;border-radius:4px;}
.sdot.w{background:#38a169;} .sdot.l{background:#c53030;}
.btn-row{display:flex;gap:9px;margin-bottom:11px;}
.bstart{flex:1;padding:12px;background:linear-gradient(135deg,#e53e3e,#c53030);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.bstart:disabled{opacity:0.35;cursor:not-allowed;}
.bstop{flex:1;padding:12px;background:transparent;color:#a0aec0;border:1px solid #2d3748;border-radius:10px;font-size:14px;cursor:pointer;}
.bstop:disabled{opacity:0.35;cursor:not-allowed;}
.warn{font-size:11px;color:#f6ad55;background:#1a1500;padding:10px 13px;border-radius:8px;border-left:3px solid #d69e2e;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0d1117;}
::-webkit-scrollbar-thumb{background:#2d3748;border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DX</div>
    <div><h1>Deriv Smart Bot</h1><p>Under · Over · Matches · Even · Odd · All Markets</p></div>
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
  </div>

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h2>Connect Your Account</h2>
      <p class="sub">Enter your Account ID and PAT token to connect.</p>
      <div class="acct-row">
        <button class="acct-btn" id="btnDemo" onclick="setAcct('demo')">Demo Account</button>
        <button class="acct-btn active" id="btnReal" onclick="setAcct('real')">Real Account</button>
      </div>
      <label>Account ID</label>
      <input type="text" id="acctIdInput" placeholder="Your Deriv account ID"/>
      <label>PAT Token</label>
      <input type="password" id="patInput" placeholder="Paste your PAT token here"/>
      <button class="btn-connect" id="connectBtn" onclick="doConnect()">Connect to Deriv</button>
    </div>
  </div>

  <div id="botScreen" style="display:none">
    <div class="sbar"><div class="dot" id="sDot"></div><span id="sTxt" style="font-size:13px;color:#718096">Connecting...</span></div>
    </div>
</div>

<script>
const APP_ID = "36544"; // Corrected App ID
let ws=null,running=false,inTrade=false,patToken=null,acctType='real';
let balance=null,currentStake=0,trades=0,wins=0,pnl=0;
let streakArr=[],digitHistory=[],consecLoss=0,contractType='DIGITUNDER';

// --- FIXED CONNECTION LOGIC (Bypasses Fetch/CORS) ---
async function doConnect() {
  const pat = document.getElementById('patInput').value.trim();
  const acctId = document.getElementById('acctIdInput').value.trim();
  if(!pat || !acctId) { alert('Please enter Account ID and Token.'); return; }
  
  patToken = pat;
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('connectBtn').textContent = 'Connecting...';
  
  showBot();
  log('Initializing secure connection...', 'info');
  
  const wsUrl = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;
  connectWS(wsUrl, pat);
}

function connectWS(url, pat) {
  if(ws) ws.close();
  ws = new WebSocket(url);
  
  ws.onopen = () => {
    log('✓ WebSocket connected. Authenticating...', 'info');
    ws.send(JSON.stringify({authorize: pat}));
  };
  
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.msg_type === 'authorize') {
        log('✓ Authorized: ' + msg.authorize.loginid, 'win');
        document.getElementById('startBtn').disabled = false;
        ws.send(JSON.stringify({balance: 1, subscribe: 1}));
      }
      handleMsg(msg, 'new');
    } catch(ex) {}
  };
}

// ... (KEEP ALL YOUR ORIGINAL FUNCTIONS: handleMsg, onTick, placeTrade, etc.)
</script>
</body>
</html>
